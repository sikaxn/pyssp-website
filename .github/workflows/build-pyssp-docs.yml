name: Build and Deploy pySSP Docs

on:
  repository_dispatch:
    types: [pyssp_release_published]
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pyssp-docs-publish
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Checkout pySSP source repo
        uses: actions/checkout@v4
        with:
          repository: sikaxn/pySSP
          ref: main
          path: pyssp-src

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sphinx myst-parser sphinx-rtd-theme

      - name: Build docs
        run: sphinx-build -b html pyssp-src/docs/source pyssp-src/docs/build/html

      - name: Prepare site artifact
        shell: bash
        run: |
          rm -rf _site
          mkdir -p _site/docs
          cp -a pyssp-src/docs/build/html/. _site/docs/
          cp -a index.html _site/index.html
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Build and Publish pySSP Docs

on:
  repository_dispatch:
    types: [pyssp_release_published]
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write

concurrency:
  group: pyssp-docs-publish
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout pySSP source repo
        uses: actions/checkout@v4
        with:
          repository: sikaxn/pySSP
          ref: main
          path: pyssp-src

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sphinx myst-parser sphinx-rtd-theme

      - name: Build docs
        run: sphinx-build -b html pyssp-src/docs/source pyssp-src/docs/build/html

      - name: Publish to docs directory
        shell: bash
        run: |
          rm -rf docs
          mkdir -p docs
          cp -a pyssp-src/docs/build/html/. docs/
          touch .nojekyll

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No documentation changes to publish."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "Publish pySSP docs from latest source"
          git push
